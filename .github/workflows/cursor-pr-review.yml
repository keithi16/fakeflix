name: Cursor PR Review

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read
  issues: read

jobs:
  review:
    name: AI Code Review
    # Only run on PR comments that contain /review
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/review') &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_USER: ${{ secrets.JIRA_USER }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      BLOCKING_REVIEW: false
      PR_NUMBER: ${{ github.event.issue.number }}

    steps:
      - name: Resolve PR branch
        id: pr
        run: |
          DATA=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '{branch: .head.ref, sha: .head.sha, base_sha: .base.sha}')
          echo "branch=$(echo $DATA | jq -r .branch)"     >> $GITHUB_OUTPUT
          echo "sha=$(echo $DATA | jq -r .sha)"           >> $GITHUB_OUTPUT
          echo "base_sha=$(echo $DATA | jq -r .base_sha)" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Extract Jira ticket ID
        id: jira
        run: |
          TICKET_ID=$(echo "${{ steps.pr.outputs.branch }}" | grep -oiE '[A-Z]+-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]' || true)
          echo "ticket_id=$TICKET_ID" >> $GITHUB_OUTPUT
          if [ -n "$TICKET_ID" ]; then
            echo "Found Jira ticket: $TICKET_ID"
          else
            echo "No Jira ticket found in branch name: ${{ steps.pr.outputs.branch }}"
          fi

      - name: Manage Jira ticket comment
        run: |
          MARKER="<!-- cursor-jira-status -->"
          TICKET_ID="${{ steps.jira.outputs.ticket_id }}"

          EXISTING_COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/$PR_NUMBER/comments \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)

          if [ -z "$TICKET_ID" ]; then
            if [ -z "$EXISTING_COMMENT_ID" ]; then
              gh pr comment "$PR_NUMBER" --body "$MARKER
          ⚠️ **No Jira ticket found in branch name.**

          Requirements cannot be verified against this PR. Please ensure your branch name contains a Jira ticket ID (e.g. \`KAN-123-my-feature\`) so the AI reviewer can validate the implementation against the requirements."
            fi
          else
            if [ -n "$EXISTING_COMMENT_ID" ]; then
              gh api repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT_ID \
                -X DELETE
            fi
            gh pr comment "$PR_NUMBER" --body "$MARKER
          ✅ **Jira ticket linked: [$TICKET_ID]($JIRA_BASE_URL/browse/$TICKET_ID)**

          Requirements will be verified against this ticket."
          fi

      - name: Cursor - PR Review
        timeout-minutes: 30
        env:
          TICKET_ID: ${{ steps.jira.outputs.ticket_id }}
        run: |
          agent -p --force --model claude-4.6-sonnet-medium-thinking --output-format text \
          "You are an automated PR reviewer running in GitHub Actions. The gh CLI is available and authenticated.
          Environment variables JIRA_BASE_URL, JIRA_USER, JIRA_API_TOKEN, and TICKET_ID are set (TICKET_ID may be empty if no Jira ticket was found in the branch name).

          Read the file .cursor/skills/pr-review/SKILL.md and follow the full protocol from Step 1 through Step 3.

          Context:
          - Repository: ${{ github.repository }}
          - PR Number: $PR_NUMBER
          - PR Head SHA: ${{ steps.pr.outputs.sha }}
          - PR Base SHA: ${{ steps.pr.outputs.base_sha }}
          - Branch: ${{ steps.pr.outputs.branch }}

          Do NOT modify any files. Do NOT approve or request-changes via gh pr review."

      - name: Blocking check
        if: env.BLOCKING_REVIEW == 'true'
        run: |
          REVIEW_BODY=$(gh pr view "$PR_NUMBER" --json reviews --jq '[.reviews[].body] | join("\n")')
          if echo "$REVIEW_BODY" | grep -qE '🚨|🔒'; then
            echo "Critical or security issues found. Failing pipeline."
            exit 1
          fi
