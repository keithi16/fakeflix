name: Create Deployment Tags for Modified Apps

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: read

jobs:
  tag-modified-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Get affected apps
        id: affected_apps
        run: |
          echo "APPS=$(npx nx show projects --affected --type=app | tr '\n' ' ')" >> $GITHUB_ENV

      - name: Create tags
        if: env.APPS != ''
        env:
          # Github actions uses the GITHUB_TOKEN to authenticate with the repository, by default
          # When you push tags from within a GitHub Action, by default those pushes won't trigger other workflows due to GitHub's security measures to prevent recursive workflow runs. To overcome this limitation, you need to use a Personal Access Token (PAT) with the appropriate permissions.
          GH_TOKEN: ${{ secrets.WORKFLOW_TAG_PUSH_TOKEN }}
        run: |
          for app in $APPS; do
            TAG_NAME="$app-$(date +%Y%m%d%H%M%S)"
            if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              echo "Tag $TAG_NAME already exists. Skipping creation."
            else
              git tag $TAG_NAME
              git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git $TAG_NAME || { echo "Error sending tag $TAG_NAME"; exit 1; }
            fi

            curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_TAG_PUSH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/${app}-build-deploy.yaml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"tag\":\"${TAG_NAME}\"}}"
            
          done
