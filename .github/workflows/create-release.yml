name: Manual App Release

permissions:
  contents: write
  actions: read
on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Select the app to release'
        required: true
        type: choice
        options:
          - billing-api
          - monolith
          - another-app
      version:
        description: 'Semantic version (e.g., 0.3.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all git tags
        run: git fetch --prune --tags || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Find latest tag for the app
      - name: Get latest tag for app
        id: latest_tag
        run: |
          TAG_PREFIX="${{ github.event.inputs.app }}@"
          LATEST_TAG=$(git tag --list "${TAG_PREFIX}*" | sort -V | tail -n1)
          echo "Latest tag for app: $LATEST_TAG"
          if [[ -z "$LATEST_TAG" ]]; then
            echo "latest=0.0.0" >> $GITHUB_OUTPUT
          else
            # remove prefix
            echo "latest=${LATEST_TAG#$TAG_PREFIX}" >> $GITHUB_OUTPUT
          fi

      # Validate version > latest
      - name: Validate version is greater than latest
        id: validate
        run: |
          npm install -g semver
          LATEST="${{ steps.latest_tag.outputs.latest }}"
          INPUT="${{ github.event.inputs.version }}"
          echo "Latest: $LATEST, Input: $INPUT"
          if ! semver "$INPUT"; then
            echo "::error::Input version is not valid semver"
            exit 1
          fi
          if semver -r ">$LATEST" "$INPUT"; then
            echo "Valid version bump"
          else
            echo "::error::Input version ($INPUT) is not greater than latest ($LATEST)"
            exit 1
          fi

      # Scoped diff preview — shows cumulative changes since last release
      - name: Scoped diff preview since last release
        id: scoped_diff
        run: |
          chmod +x .github/scripts/resolve-app-deps.sh
          APP="${{ github.event.inputs.app }}"
          TAG_PREFIX="${APP}@"
          LATEST_TAG=$(git tag --list "${TAG_PREFIX}*" | sort -V | tail -n1)
          if [[ -z "$LATEST_TAG" ]]; then
            BASE=$(git rev-list --max-parents=0 HEAD)
            echo "No previous release tag found. Diffing from first commit."
          else
            BASE="$LATEST_TAG"
            echo "Diffing since last release tag: $LATEST_TAG"
          fi

          DEP_PATHS=$(.github/scripts/resolve-app-deps.sh "$APP" 2>/dev/null || echo "")
          echo "Dependency paths: $DEP_PATHS"

          if [[ -n "$DEP_PATHS" ]]; then
            COMMIT_LOG=$(git log --oneline "${BASE}..HEAD" -- $DEP_PATHS)
          else
            COMMIT_LOG=$(git log --oneline "${BASE}..HEAD")
          fi

          echo "--- Scoped commits pending for ${APP} ---"
          echo "${COMMIT_LOG:-"(no commits since last release)"}"
          echo "--- End of scoped diff ---"

          # Persist for release body
          {
            echo 'SCOPED_DIFF<<SCOPED_DIFF_EOF'
            echo "## Commits since \`${LATEST_TAG:-"(initial)"}\`"
            echo ""
            echo "${COMMIT_LOG:-"(no commits since last release)"}"
            echo 'SCOPED_DIFF_EOF'
          } >> "$GITHUB_ENV"

      # Bump version (does not commit or tag)
      - name: Bump version only (no git)
        run: |
          npx nx release version ${{ github.event.inputs.version }} -p ${{ github.event.inputs.app }} --git-commit=false --stage-changes=false --git-tag=false --git-push=false

      # Generate changelog (no git)
      - name: Generate changelog
        run: |
          npx nx release changelog ${{ github.event.inputs.version }} -p ${{ github.event.inputs.app }} --git-commit=false --stage-changes=false --git-tag=false --git-push=false

      # Commit package.json and changelog
      - name: Commit app package.json and changelog
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add app/${{ github.event.inputs.app }}/package.json
          git add app/${{ github.event.inputs.app }}/CHANGELOG.md
          git commit -m "release: bump ${{ github.event.inputs.app }} to v${{ github.event.inputs.version }}"
          git tag ${{ github.event.inputs.app }}@${{ github.event.inputs.version }}

      # Push commit and tag
      - name: Push commit and tag
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push origin HEAD
          git push origin ${{ github.event.inputs.app }}@${{ github.event.inputs.version }}

      # Extract latest changelog entry
      - name: Extract latest changelog section
        id: extract_changelog
        run: |
          version="${{ github.event.inputs.version }}"
          changelog_file="app/${{ github.event.inputs.app }}/CHANGELOG.md"
          # Extract from the version heading down to the next heading (or EOF)
          awk "/^## $version /{flag=1; print; next} /^## [0-9]+\.[0-9]+\.[0-9]+/{flag=0} flag" "$changelog_file" > latest_changelog.md
          cat latest_changelog.md
      - name: Append scoped diff to release body
        run: |
          echo "" >> latest_changelog.md
          echo "---" >> latest_changelog.md
          echo "" >> latest_changelog.md
          printf '%s\n' "$SCOPED_DIFF" >> latest_changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.app }}@${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.app }}@${{ github.event.inputs.version }}
          body_path: latest_changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch deploy workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP="${{ github.event.inputs.app }}"
          VERSION="${{ github.event.inputs.version }}"
          TAG="${APP}@${VERSION}"
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${APP}-build-deploy.yaml/dispatches" \
            -d "{\"ref\":\"${TAG}\",\"inputs\":{\"tag\":\"${TAG}\"}}"
