name: CI

on: push

permissions:
  contents: read
  actions: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        ports:
          - '5432:5432'
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fakeflix_test
        # Set health checks to wait until Postgres has started.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
        # Set health checks to wait until Redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      localstack:
        image: localstack/localstack
        ports:
          - 4566:4566

    env:
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@master
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install AWS CLI
        run: sudo pip install awscli

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id test
          aws configure set aws_secret_access_key test
          aws configure set region us-east-1
          aws configure set output json

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH
      - name: Architecture Review (Simple JSON)
        timeout-minutes: 3
        run: |
          echo "🚀 Evaluating architecture compliance..."
          
          cursor-agent -p "
            Evaluate this code for architecture compliance.
            Respond with valid JSON only:
            {\"rating\": 9, \"summary\": \"Good compliance with minor issues\"}
          " --model claude-4-sonnet --output-format json | tee .cursor.log
          
          # Parse JSON
          RATING=$(jq -r '.rating' .cursor.log 2>/dev/null)
          SUMMARY=$(jq -r '.summary' .cursor.log 2>/dev/null)
          
          echo "📊 Rating: $RATING/10"
          echo "📝 Summary: $SUMMARY"
          
          # Simple validation
          if [[ ! "$RATING" =~ ^[0-9]+$ ]] || [ "$RATING" -lt 9 ]; then
            echo "❌ Rating $RATING below threshold 9"
            exit 1
          fi
          
          echo "✅ Architecture compliance passed"
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          cursor-agent -p "now you are an architect and will evaluate the changes made to this code comply with the guidelines in this repo, do a full evaluation and rate it from 1-10, if the rate is below 9 you should return with error" --model claude-4-sonnet --output-format json
          
          # Extract the rating from the log
          RATING=$(cat .cursor.log | grep -oE "Rating[: ]+([0-9]+)" | grep -oE "[0-9]+" | head -1)
          
          # Display the rating
          echo "Architecture Rating: $RATING"
          
          # Check if rating exists and is below 9
          if [ -z "$RATING" ]; then
            echo "❌ Could not extract rating from Cursor Agent output"
            echo "Full log:"
            cat .cursor.log
            exit 1
          elif [ "$RATING" -lt 9 ]; then
            echo "❌ Architecture rating ($RATING/10) is below the required threshold of 9"
            echo "Full evaluation log:"
            cat .cursor.log
            exit 1
          else
            echo "✅ Architecture rating ($RATING/10) meets the required threshold"
          fi
      - name: Code format
        shell: bash
        run: |
          yarn lint:all

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done

      - name: Drop and Recreate Database
        run: |
          psql -h localhost -U postgres -c "DROP DATABASE IF EXISTS fakeflix_test WITH (FORCE);"
          psql -h localhost -U postgres -c "CREATE DATABASE fakeflix_test;"

      - name: Setup modules databases
        shell: bash
        run: |
          yarn db:migrate:all

      - name: Test unit
        shell: bash
        run: yarn test:unit:affected

      - name: Test E2E
        shell: bash
        run: |
          yarn test:e2e:affected
