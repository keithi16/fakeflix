name: CI

on: push

permissions:
  contents: read
  actions: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        ports:
          - '5432:5432'
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fakeflix_test
        # Set health checks to wait until Postgres has started.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
        # Set health checks to wait until Redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      localstack:
        image: localstack/localstack
        ports:
          - 4566:4566

    env:
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@master
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install AWS CLI
        run: sudo pip install awscli

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id test
          aws configure set aws_secret_access_key test
          aws configure set region us-east-1
          aws configure set output json

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH
      
      - name: Get changed files
        id: changed-files
        run: |
          echo "🔍 Detecting changed files..."
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PRs, get files changed compared to base branch
            git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} > changed_files.txt
            echo "📝 Changed files (PR vs base):"
          else
            # For pushes, get files changed in last commit(s)
            if [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              # Normal push with previous commit
              git diff --name-only ${{ github.event.before }} ${{ github.sha }} > changed_files.txt
            else
              # First push to branch, compare with HEAD~1
              git diff --name-only HEAD~1 HEAD > changed_files.txt 2>/dev/null || git ls-files > changed_files.txt
            fi
            echo "📝 Changed files (commit diff):"
          fi
          
          # Filter for relevant files only (TypeScript, docs, configs)
          grep -E '\.(ts|js|json|md|yml|yaml)$' changed_files.txt > filtered_files.txt || touch filtered_files.txt
          
          echo "Files to evaluate:"
          cat filtered_files.txt
          
          # Set output for next step
          if [ -s filtered_files.txt ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Architecture Review (Changed Files Only)
        if: steps.changed-files.outputs.has_changes == 'true'
        timeout-minutes: 5
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          echo "🚀 Evaluating architecture compliance for changed files..."
          
          # Prepare changed files list for cursor-agent
          CHANGED_FILES=$(cat filtered_files.txt | tr '\n' ' ' | sed 's/[[:space:]]*$//')
          echo "📋 Files to evaluate: $CHANGED_FILES"
          
          # Run cursor-agent with specific file focus
          set +e  # Don't exit on command failure
          timeout 120s cursor-agent -p "Evaluate ONLY these changed files for architecture compliance with the Fakeflix architecture guidelines: $CHANGED_FILES. Return only a JSON object with 'rating' (1-10 number) and 'summary' (brief text). Example: {\"rating\": 8, \"summary\": \"Good compliance but missing observability\"}" --model claude-4-sonnet --output-format json > .cursor.log 2>&1
          AGENT_EXIT_CODE=$?
          set -e  # Re-enable exit on error
          
          # Display the full log for debugging
          echo "=== Cursor Agent Output ==="
          cat .cursor.log
          echo "=========================="
          echo "Agent Exit Code: $AGENT_EXIT_CODE"
          
          # Extract rating (simplified)
          RATING=$(cat .cursor.log | jq -r '.result' 2>/dev/null | grep -oE '"rating":\s*[0-9]+' | grep -oE '[0-9]+' | head -1 || echo "")
          
          # If no rating found, try direct extraction
          if [ -z "$RATING" ]; then
            RATING=$(cat .cursor.log | grep -oE '"rating":\s*[0-9]+' | grep -oE '[0-9]+' | head -1 || echo "")
          fi
          
          echo "📊 Extracted Rating: $RATING"
          
          # Check agent exit code first
          if [ $AGENT_EXIT_CODE -ne 0 ]; then
            echo "❌ Cursor Agent returned error (exit code: $AGENT_EXIT_CODE)"
            exit 1
          fi
          
          # Validate and check rating
          if [ -z "$RATING" ] || ! [[ "$RATING" =~ ^[0-9]+$ ]]; then
            echo "❌ Could not extract valid rating from Cursor Agent output"
            exit 1
          elif [ "$RATING" -lt 8 ]; then
            echo "❌ Architecture rating ($RATING/10) is below the required threshold of 8"
            echo "Pipeline failed due to architecture compliance issues"
            exit 1
          else
            echo "✅ Architecture rating ($RATING/10) meets the required threshold"
          fi

      - name: Architecture Review (No Changes)
        if: steps.changed-files.outputs.has_changes == 'false'
        run: |
          echo "ℹ️ No relevant files changed - skipping architecture review"
          echo "✅ Architecture check passed (no changes to evaluate)"
      - name: Code format
        shell: bash
        run: |
          yarn lint:all

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done

      - name: Drop and Recreate Database
        run: |
          psql -h localhost -U postgres -c "DROP DATABASE IF EXISTS fakeflix_test WITH (FORCE);"
          psql -h localhost -U postgres -c "CREATE DATABASE fakeflix_test;"

      - name: Setup modules databases
        shell: bash
        run: |
          yarn db:migrate:all

      - name: Test unit
        shell: bash
        run: yarn test:unit:affected

      - name: Test E2E
        shell: bash
        run: |
          yarn test:e2e:affected
