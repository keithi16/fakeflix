name: CI

on: push

permissions:
  contents: read
  actions: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        ports:
          - '5432:5432'
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fakeflix_test
        # Set health checks to wait until Postgres has started.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
        # Set health checks to wait until Redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      localstack:
        image: localstack/localstack
        ports:
          - 4566:4566

    env:
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@master
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install AWS CLI
        run: sudo pip install awscli

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id test
          aws configure set aws_secret_access_key test
          aws configure set region us-east-1
          aws configure set output json

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH
      - name: Architecture Review (Simple JSON)
        timeout-minutes: 5
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          echo "🚀 Evaluating architecture compliance..."
          
          # Run cursor-agent with timeout and capture output
          timeout 240s cursor-agent -p "Evaluate the stripe.service.ts for architecture compliance with the Fakeflix guidelines. Return only a JSON object with 'rating' (1-10 number) and 'summary' (brief text). Example: {\"rating\": 8, \"summary\": \"Good compliance but missing observability\"}" --model claude-4-sonnet --output-format json > .cursor.log 2>&1 || echo "Agent completed or timed out" 
          
          # Display the full log for debugging
          echo "=== Cursor Agent Output ==="
          cat .cursor.log
          echo "=========================="
          
          # Extract rating from the nested JSON structure
          RATING=""
          SUMMARY=""
          
          # Method 1: Extract JSON from markdown code block in result field
          JSON_BLOCK=$(cat .cursor.log | jq -r '.result' 2>/dev/null | grep -o '{"rating":[^}]*}' | head -1 || echo "")
          if [ -n "$JSON_BLOCK" ]; then
            RATING=$(echo "$JSON_BLOCK" | jq -r '.rating' 2>/dev/null || echo "")
            SUMMARY=$(echo "$JSON_BLOCK" | jq -r '.summary' 2>/dev/null || echo "")
          fi
          
          # Method 2: Simple regex extraction for rating number
          if [ -z "$RATING" ] || [ "$RATING" = "null" ]; then
            RATING=$(cat .cursor.log | grep -oE '"rating":\s*[0-9]+' | grep -oE '[0-9]+' | head -1 || echo "")
          fi
          
          # Method 3: Try direct JSON parsing (fallback)
          if [ -z "$RATING" ] || [ "$RATING" = "null" ]; then
            RATING=$(cat .cursor.log | jq -r '.rating' 2>/dev/null || echo "")
          fi
          
          # Extract summary if not already found
          if [ -z "$SUMMARY" ] || [ "$SUMMARY" = "null" ]; then
            SUMMARY="Architecture evaluation completed"
          fi
          
          echo "📊 Extracted Rating: $RATING"
          echo "📝 Summary: $SUMMARY"
          
          # Validate and check rating
          if [ -z "$RATING" ] || ! [[ "$RATING" =~ ^[0-9]+$ ]]; then
            echo "❌ Could not extract valid rating from Cursor Agent output"
            echo "Please check the agent response format above"
            exit 1
          elif [ "$RATING" -lt 9 ]; then
            echo "❌ Architecture rating ($RATING/10) is below the required threshold of 9"
            echo "Pipeline failed due to architecture compliance issues"
            exit 1
          else
            echo "✅ Architecture rating ($RATING/10) meets the required threshold"
          fi
      - name: Code format
        shell: bash
        run: |
          yarn lint:all

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done

      - name: Drop and Recreate Database
        run: |
          psql -h localhost -U postgres -c "DROP DATABASE IF EXISTS fakeflix_test WITH (FORCE);"
          psql -h localhost -U postgres -c "CREATE DATABASE fakeflix_test;"

      - name: Setup modules databases
        shell: bash
        run: |
          yarn db:migrate:all

      - name: Test unit
        shell: bash
        run: yarn test:unit:affected

      - name: Test E2E
        shell: bash
        run: |
          yarn test:e2e:affected
