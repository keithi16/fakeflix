name: CI

on: push

permissions:
  contents: read
  actions: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        ports:
          - '5432:5432'
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fakeflix_test
        # Set health checks to wait until Postgres has started.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
        # Set health checks to wait until Redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      localstack:
        image: localstack/localstack
        ports:
          - 4566:4566

    env:
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@master
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install AWS CLI
        run: sudo pip install awscli

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id test
          aws configure set aws_secret_access_key test
          aws configure set region us-east-1
          aws configure set output json

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH
      
      # - name: Architecture Guard
      #   timeout-minutes: 5
      #   env:
      #     CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      #   run: |
      #     cursor-agent --force --model auto --output-format=text --print "You are operating in a GitHub Actions runner performing automated code review. The gh CLI is available and authenticated via GH_TOKEN. You may comment on pull requests.
      #     Context:
      #     - Repo: ${{ github.repository }}
      #     - PR Number: ${{ github.event.pull_request.number }}
      #     - PR Head SHA: ${{ github.event.pull_request.head.sha }}
      #     - PR Base SHA: ${{ github.event.pull_request.base.sha }}
      #     Objectives:
      #     1) Re-check existing review comments and reply resolved when addressed
      #     2) Review the current PR diff and flag only clear, high-severity issues based on the projects docs/ARCHITECTURE-GUIDELINES.md
      #     3) Leave very short inline comments (1-2 sentences) on changed lines only and a brief summary at the end
      #     Procedure:
      #     - Get existing comments: gh pr view --json comments
      #     - Get diff: gh pr diff
      #     - If a previously reported issue appears fixed by nearby changes, reply: ✅ This issue appears to be resolved by the recent changes
      #     - Avoid duplicates: skip if similar feedback already exists on or near the same lines
      #     Commenting rules:
      #     - Max 10 inline comments total; prioritize the most critical issues
      #     - One issue per comment; place on the exact changed line
      #     - Natural tone, specific and actionable; do not mention automated or high-confidence
      #     - Use emojis: 🚨 Critical 🔒 Security ⚡ Performance ⚠️ Logic ✅ Resolved ✨ Improvement
      #     Submission:
      #     - Submit one review containing inline comments plus a concise summary
      #     - Use only: gh pr review --comment
      #     - Do not use: gh pr review --approve or --request-changes"
      - name: Code format
        shell: bash
        run: |
          yarn lint:all

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done

      - name: Drop and Recreate Database
        run: |
          psql -h localhost -U postgres -c "DROP DATABASE IF EXISTS fakeflix_test WITH (FORCE);"
          psql -h localhost -U postgres -c "CREATE DATABASE fakeflix_test;"

      - name: Setup modules databases
        shell: bash
        run: |
          yarn db:migrate:all

      - name: Test unit
        shell: bash
        run: yarn test:unit:affected

      - name: Test E2E
        shell: bash
        run: |
          yarn test:e2e:affected
