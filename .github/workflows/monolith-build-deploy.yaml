name: Deploy Monolith

on:
  push:
    tags:
      - 'monolith-*' # Essa action só executa quando uma tag com prefixo 'monolith-' for criada
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get tag name
        id: get-tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "TAG_NAME=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
            echo "Using tag from dispatch input: ${{ github.event.inputs.tag }}"
          else
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "Using tag from push event: ${GITHUB_REF#refs/tags/}"
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-tag.outputs.TAG_NAME }}
          fetch-depth: 0

      - name: Build Docker Image
        run: |
          # Use the correct main.js path for monolith
          docker build -t monolith:latest \
            --build-arg APP_COMMAND="node dist/app/monolith/main.js" \
            --build-arg APP_NAME=monolith \
            .

          # Tag with the correct tag name from earlier step
          docker tag monolith:latest monolith:${{ steps.get-tag.outputs.TAG_NAME }}

          # List images to verify
          docker images | grep monolith

      # Add deployment steps here
      - name: Deploy to staging
        run: |
          echo "Deploying monolith:${{ steps.get-tag.outputs.TAG_NAME }} to staging environment"
          # Add actual deployment commands here
