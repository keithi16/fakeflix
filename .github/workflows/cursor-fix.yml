name: Cursor Fix

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  fix:
    name: AI Auto-fix
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/fix') &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.issue.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout "$PR_NUMBER"

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Override CLI permissions for file writes
        run: |
          cat > .cursor/cli.json << 'EOF'
          {
            "permissions": {
              "allow": [],
              "deny": [
                "Shell(git push)",
                "Shell(git commit)",
                "Shell(gh pr create)"
              ]
            }
          }
          EOF

      - name: React to comment (acknowledged)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -X POST -f content=eyes

      - name: Cursor - Apply fixes
        timeout-minutes: 15
        run: |
          cat > /tmp/fix-prompt.txt << 'PROMPT'
          You are an automated code fixer running in GitHub Actions. The gh CLI is available and authenticated.

          Context:
          - Repo: ${{ github.repository }}
          - PR Number: $PR_NUMBER

          Objectives:
          1. Fetch inline review comments: gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/comments
          2. For each comment, fetch its reactions: gh api repos/${{ github.repository }}/pulls/comments/{comment_id}/reactions
          3. A comment is eligible for fixing if ANY of these is true:
             a) Its body contains 🚨 or 🔒 (critical or security issue flagged by the reviewer)
             b) A non-bot user (login does not end in [bot]) has added a 👍 (+1) reaction to it
          4. Skip any comment whose body contains [RESOLVED] -- those are already addressed
          5. Read the relevant source files for each eligible comment
          6. Apply the minimal, targeted fix for each eligible issue
          7. For each comment you successfully fixed, reply to it with:
             gh api repos/${{ github.repository }}/pulls/comments/{comment_id}/replies -X POST -f body="[RESOLVED] Applied fix: <describe what was changed>"
          8. Do NOT commit or push -- only modify files on disk

          Rules:
          - [RESOLVED] in a comment body means already fixed -- skip it
          - 👍 (+1) as a GitHub reaction by a human means the user wants it fixed
          - Only reply [RESOLVED] if you actually changed a file
          - Make minimal, surgical changes -- do not refactor beyond the issue scope
          - Do NOT run git commit or git push (the workflow handles this)
          - Do NOT modify .cursor/cli.json or any workflow files
          PROMPT
          agent -p --force --model claude-4.6-sonnet-medium-thinking --output-format text "$(cat /tmp/fix-prompt.txt)"

      - name: Commit and push fixes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "fix: auto-fix critical issues from Cursor review"
            git push
            gh pr comment "$PR_NUMBER" --body "🤖 Applied auto-fixes for 🚨 Critical and 🔒 Security issues. Please review the changes."
          else
            gh pr comment "$PR_NUMBER" --body "✅ No changes needed -- all critical issues appear already resolved."
          fi

      - name: React to comment (done)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -X POST -f content=rocket
